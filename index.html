<style>
:root{--p:#2563eb;--g:#16a34a;--r:#dc2626;--bg:#f1f5f9;--card:#fff;--bd:#e2e8f0;--tx:#1e293b;--mt:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--tx);font-size:13px}
#lockScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1e3a5f,#2563eb);display:flex;align-items:center;justify-content:center;z-index:9999}
#lockScreen.hidden{display:none}
.lock-box{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);min-width:340px}
.lock-box h2{font-size:20px;color:#1e293b;margin-bottom:6px}
.lock-box p{font-size:13px;color:#64748b;margin-bottom:24px}
.lock-box input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;text-align:center;outline:none;transition:.2s}
.lock-box input:focus{border-color:#2563eb}
.lock-box input.err{border-color:#dc2626;animation:shake .4s}
.lock-box button{margin-top:14px;width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.lock-box button:hover{background:#1d4ed8}
.lock-msg{font-size:12px;color:#dc2626;margin-top:8px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.hdr{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;font-weight:700}
.hdr-r{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.hdr-r label{color:#bfdbfe;font-size:12px}
.hdr-r select{padding:5px 10px;border-radius:5px;border:none;font-size:13px}
.wrap{max-width:1500px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:10px;border:1px solid var(--bd);padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h2{font-size:15px;font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--p);color:var(--p)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f1f5f9;padding:7px 6px;text-align:left;font-weight:600;position:sticky;top:0;border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:6px;border-bottom:1px solid var(--bd);white-space:nowrap}
tr:hover td{background:#f8fafc}
.n{text-align:right;font-variant-numeric:tabular-nums}
.up{color:var(--g)}.dn{color:var(--r)}
.tw{max-height:600px;overflow:auto;border:1px solid var(--bd);border-radius:8px}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid var(--bd);transition:.15s;background:#fff;user-select:none}
.chip.on{background:var(--p);color:#fff;border-color:var(--p)}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);cursor:pointer;font-size:12px;background:#fff;transition:.15s;user-select:none}
.tab.on{background:var(--p);color:#fff;border-color:var(--p)}
.ch-box{position:relative;height:340px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.sb{background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--bd)}
.sb .lb{font-size:11px;color:var(--mt)}
.sb .vl{font-size:18px;font-weight:700;margin:2px 0}
.sb .dl{font-size:11px}
select.sm{padding:3px 6px;font-size:12px;border-radius:4px;border:1px solid var(--bd)}
input.sm{padding:3px 6px;font-size:12px;border-radius:4px;border:1px solid var(--bd);width:90px}
.ctrl{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.ctrl label{font-size:11px;color:var(--mt);min-width:55px}
.ml{border-left:2px solid #cbd5e1}
.bgym{background:#fffbeb}
.bgsm{background:#f8fafc}
.tot-row td{background:#eff6ff!important;font-weight:700}
</style>
</head>
<body>
<div id="lockScreen">
  <div class="lock-box">
    <h2>🔒 스카이브릿지</h2>
    <p>영업실적 대시보드에 접근하려면<br>비밀번호를 입력하세요.</p>
    <input type="password" id="pwInput" placeholder="비밀번호 입력" autofocus>
    <button id="pwBtn" onclick="checkPw()">확인</button>
    <div class="lock-msg" id="pwMsg"></div>
  </div>
</div>
<div id="mainContent" style="display:none">
<div class="hdr">
  <h1>스카이브릿지 — 지사별 월별 실적 분석</h1>
  <div class="hdr-r">
    <label>지사</label>
    <select id="selBranch"><option value="전체">전체</option></select>
  </div>
</div>
<div class="wrap">
<div class="grid4" id="summaryCards"></div>

<div class="card">
  <h2>📈 월별 총매출 · 순매출 추이</h2>
  <div class="ctrl">
    <label>차트 항목</label>
    <div class="tabs" id="chartTabs">
      <div class="tab on" data-v="both">총매출+순매출</div>
      <div class="tab" data-v="sales">총매출</div>
      <div class="tab" data-v="net">순매출</div>
    </div>
  </div>
  <div class="ch-box"><canvas id="chartTrend"></canvas></div>
</div>

<div class="card">
  <h2>📊 월별 상세 실적 (전월대비 증감)</h2>
  <div class="ctrl">
    <label>표시 기준</label>
    <div class="tabs" id="viewTabs">
      <div class="tab on" data-v="branch">지사별</div>
      <div class="tab" data-v="dept">부서별</div>
      <div class="tab" data-v="work">업무별</div>
      <div class="tab" data-v="rep">영업담당별</div>
      <div class="tab" data-v="vendor">업체별</div>
      <div class="tab" data-v="branch_work">지사+업무</div>
      <div class="tab" data-v="branch_rep">지사+영업담당</div>
      <div class="tab" data-v="dept_work">부서+업무</div>
      <div class="tab" data-v="dept_rep">부서+영업담당</div>
    </div>
  </div>
  <div class="ctrl">
    <label>부서</label><div class="chips" id="deptChips"></div>
  </div>
  <div class="ctrl">
    <label>업무</label><div class="chips" id="workChips"></div>
  </div>
  <div class="ctrl">
    <label>영업담당</label><select id="selRep" class="sm"><option value="">전체</option></select>
    <label style="margin-left:12px">최소 순매출</label><input id="minNet" class="sm" type="number" value="0" step="100000" title="업체별 뷰에서 최소 순매출 필터">
  </div>
  <div class="tw" id="tableWrap"></div>
</div>
</div>
</div><!-- /mainContent -->

<script>
function checkPw(){
  const input=document.getElementById('pwInput').value;
  const hash=Array.from(new TextEncoder().encode(input)).reduce((h,b)=>(((h<<5)-h)+b)|0,0);
  if(hash===100334834){
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('mainContent').style.display='';
    sessionStorage.setItem('sb_auth','1');
    if(typeof renderAll==='function')setTimeout(renderAll,100);
  }else{
    document.getElementById('pwInput').classList.add('err');
    document.getElementById('pwMsg').textContent='비밀번호가 틀렸습니다.';
    setTimeout(()=>{document.getElementById('pwInput').classList.remove('err');},500);
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
if(sessionStorage.getItem('sb_auth')==='1'){
  document.getElementById('lockScreen').classList.add('hidden');
  document.getElementById('mainContent').style.display='';
}
</script>

const fmt = n => n==null?'-':n.toLocaleString('ko-KR');
const fmtM = n => {if(n==null)return'-';const a=Math.abs(n);if(a>=100000000)return(n/100000000).toFixed(1)+'억';if(a>=10000)return Math.round(n/10000).toLocaleString()+'만';return fmt(n);};

const selBranch=document.getElementById('selBranch');
const selRep=document.getElementById('selRep');
const minNetInput=document.getElementById('minNet');
DATA.branches.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;selBranch.appendChild(o);});
DATA.reps.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;selRep.appendChild(o);});

let activeDepts=new Set(DATA.depts), activeWorks=new Set(DATA.works);
let currentView='branch', chartMetric='both';

function mkChips(id,items,activeSet,cb){
  const box=document.getElementById(id);box.innerHTML='';
  const all=document.createElement('span');all.className='chip'+(activeSet.size===items.length?' on':'');
  all.textContent='전체';all.onclick=()=>{items.forEach(x=>activeSet.add(x));mkChips(id,items,activeSet,cb);cb();};
  box.appendChild(all);
  items.forEach(d=>{
    const c=document.createElement('span');c.className='chip'+(activeSet.has(d)?' on':'');c.textContent=d;
    c.onclick=()=>{activeSet.has(d)?activeSet.delete(d):activeSet.add(d);mkChips(id,items,activeSet,cb);cb();};
    box.appendChild(c);
  });
}
mkChips('deptChips',DATA.depts,activeDepts,renderAll);
mkChips('workChips',DATA.works,activeWorks,renderAll);

function fRaw(){
  const br=selBranch.value,rp=selRep.value;
  return DATA.raw.filter(d=>(br==='전체'||d.branch===br)&&activeDepts.has(d.dept)&&activeWorks.has(d.work)&&(!rp||d.rep===rp));
}
function fVendor(){
  const br=selBranch.value,rp=selRep.value;
  return DATA.vendors.filter(d=>(br==='전체'||d.branch===br)&&activeDepts.has(d.dept)&&activeWorks.has(d.work)&&(!rp||d.rep===rp));
}

function renderSummary(){
  const f=fRaw(),box=document.getElementById('summaryCards');
  const byM={};f.forEach(d=>{if(!byM[d.ym])byM[d.ym]={s:0,c:0,n:0,cnt:0};byM[d.ym].s+=d.sales;byM[d.ym].c+=d.cost;byM[d.ym].n+=d.net;byM[d.ym].cnt+=d.cnt;});
  const last=DATA.months[DATA.months.length-1],prev=DATA.months[DATA.months.length-2];
  const cur=byM[last]||{s:0,c:0,n:0,cnt:0},prv=byM[prev]||{s:0,c:0,n:0,cnt:0};
  function cd(lb,v,pv){const d=v-pv,p=pv?((v/pv-1)*100).toFixed(1):'N/A',cls=d>=0?'up':'dn',ar=d>=0?'▲':'▼';
    return`<div class="sb"><div class="lb">${lb}</div><div class="vl">${fmt(v)}</div><div class="dl ${cls}">${ar} ${fmt(Math.abs(d))} (${p}%)</div></div>`;}
  const yl=last.slice(0,4)+'년 '+parseInt(last.slice(4))+'월';
  box.innerHTML=cd(yl+' 총매출',cur.s,prv.s)+cd(yl+' 비용매출',cur.c,prv.c)+cd(yl+' 순매출',cur.n,prv.n)+cd(yl+' 건수',cur.cnt,prv.cnt);
}

let trendChart=null;
function renderTrend(){
  const f=fRaw(),byM={};
  f.forEach(d=>{if(!byM[d.ym])byM[d.ym]={s:0,c:0,n:0};byM[d.ym].s+=d.sales;byM[d.ym].c+=d.cost;byM[d.ym].n+=d.net;});
  const labels=DATA.months.map(m=>m.slice(2,4)+'.'+parseInt(m.slice(4)));
  const sA=DATA.months.map(m=>(byM[m]||{}).s||0);
  const nA=DATA.months.map(m=>(byM[m]||{}).n||0);
  const cA=DATA.months.map(m=>(byM[m]||{}).c||0);
  const ctx=document.getElementById('chartTrend').getContext('2d');
  if(trendChart)trendChart.destroy();
  const ds=[];
  if(chartMetric==='both'||chartMetric==='sales'){
    ds.push({label:'총매출',data:sA,backgroundColor:'#93c5fd',borderRadius:4,order:2});
    ds.push({label:'비용매출',data:cA,backgroundColor:'#fca5a5',borderRadius:4,order:3});
  }
  if(chartMetric!=='sales')ds.push({label:'순매출',type:'line',data:nA,borderColor:'#16a34a',borderWidth:2.5,pointRadius:5,pointBackgroundColor:'#16a34a',fill:false,order:1,tension:.2});
  trendChart=new Chart(ctx,{type:'bar',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{font:{size:11}}},tooltip:{callbacks:{label:i=>i.dataset.label+': '+fmtM(i.raw)}}},
    scales:{y:{ticks:{callback:v=>fmtM(v)},grid:{color:'#f1f5f9'}},x:{grid:{display:false}}}
  }});
}

function renderTable(){
  const view=currentView;
  const isVendor=view==='vendor';
  const src=isVendor?fVendor():fRaw();
  const minNet=parseInt(minNetInput.value)||0;

  function gk(d){
    switch(view){
      case'branch':return d.branch;
      case'dept':return d.dept;
      case'work':return d.work;
      case'rep':return d.rep||'(미지정)';
      case'vendor':return d.name;
      case'branch_work':return d.branch+' · '+d.work;
      case'branch_rep':return d.branch+' · '+(d.rep||'(미지정)');
      case'dept_work':return d.dept+' · '+d.work;
      case'dept_rep':return d.dept+' · '+(d.rep||'(미지정)');
    }
  }

  // extra info for vendor view
  const vendorInfo={};

  const agg={};
  src.forEach(d=>{
    const k=gk(d),mk=k+'||'+d.ym;
    if(!agg[mk])agg[mk]={key:k,ym:d.ym,sales:0,cost:0,net:0,cnt:0};
    agg[mk].sales+=d.sales;agg[mk].cost+=d.cost;agg[mk].net+=d.net;agg[mk].cnt+=d.cnt;
    if(isVendor&&!vendorInfo[k])vendorInfo[k]={dept:d.dept,work:d.work,rep:d.rep,branch:d.branch};
  });

  const pivot={};
  Object.values(agg).forEach(a=>{if(!pivot[a.key])pivot[a.key]={};pivot[a.key][a.ym]={sales:a.sales,cost:a.cost,net:a.net,cnt:a.cnt};});

  const last=DATA.months[DATA.months.length-1];
  let keys=Object.keys(pivot);

  // minNet filter for vendor view
  if(isVendor&&minNet>0){
    keys=keys.filter(k=>{
      let maxN=0;DATA.months.forEach(m=>{const v=(pivot[k][m]||{}).net||0;if(Math.abs(v)>maxN)maxN=Math.abs(v);});
      return maxN>=minNet;
    });
  }

  keys.sort((a,b)=>((pivot[b][last]||{}).net||0)-((pivot[a][last]||{}).net||0));

  // Header
  const extraCols=isVendor?'<th rowspan="2">부서</th><th rowspan="2">업무</th><th rowspan="2">영업담당</th>':'';
  let th1='<tr><th rowspan="2">#</th><th rowspan="2">구분</th>'+extraCols;
  let th2='<tr>';
  DATA.months.forEach((m,i)=>{
    const ml=m.slice(2,4)+'.'+parseInt(m.slice(4))+'월';
    th1+=`<th colspan="3" style="text-align:center" class="ml">${ml}</th>`;
    if(i>0)th1+=`<th rowspan="2" style="text-align:center" class="ml bgym" title="전월대비 순매출 증감률">증감</th>`;
    th2+=`<td class="ml bgsm" style="font-weight:600;text-align:right">총매출</td><td class="bgsm" style="font-weight:600;text-align:right">비용</td><td class="bgsm" style="font-weight:600;text-align:right">순매출</td>`;
    if(i>0)th2+='<td></td>';
  });
  th1+='</tr>';th2+='</tr>';

  // Body
  let tbody='';
  keys.forEach((k,idx)=>{
    const row=pivot[k];
    const vi=vendorInfo[k]||{};
    const extra=isVendor?`<td><span style="background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:8px;font-size:11px">${vi.dept||''}</span></td><td>${vi.work||''}</td><td>${vi.rep||'-'}</td>`:'';
    tbody+=`<tr><td>${idx+1}</td><td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${k}">${k}</td>${extra}`;
    DATA.months.forEach((m,i)=>{
      const c=row[m]||{sales:0,cost:0,net:0};
      tbody+=`<td class="n ml">${fmt(c.sales)}</td><td class="n">${fmt(c.cost)}</td><td class="n" style="font-weight:600">${fmt(c.net)}</td>`;
      if(i>0){
        const pm=DATA.months[i-1],p=row[pm]||{net:0};
        const d=c.net-p.net,cls=d>=0?'up':'dn',ar=d>0?'▲':d<0?'▼':'';
        const pv=p.net?((c.net/p.net-1)*100).toFixed(1)+'%':(c.net>0?'NEW':'-');
        tbody+=`<td class="n ${cls} ml bgym" style="font-size:11px">${ar}${pv}</td>`;
      }
    });
    tbody+='</tr>';
  });

  // Total
  tbody+='<tr class="tot-row"><td></td><td>합계</td>';
  if(isVendor)tbody+='<td></td><td></td><td></td>';
  DATA.months.forEach((m,i)=>{
    let ts=0,tc=0,tn=0;keys.forEach(k=>{const c=pivot[k][m]||{sales:0,cost:0,net:0};ts+=c.sales;tc+=c.cost;tn+=c.net;});
    tbody+=`<td class="n ml">${fmt(ts)}</td><td class="n">${fmt(tc)}</td><td class="n">${fmt(tn)}</td>`;
    if(i>0){
      let ptn=0;const pm=DATA.months[i-1];keys.forEach(k=>{ptn+=(pivot[k][pm]||{net:0}).net;});
      const d=tn-ptn,cls=d>=0?'up':'dn',ar=d>0?'▲':d<0?'▼':'';
      tbody+=`<td class="n ${cls} ml bgym" style="font-size:11px">${ar}${ptn?((tn/ptn-1)*100).toFixed(1)+'%':''}</td>`;
    }
  });
  tbody+='</tr>';

  document.getElementById('tableWrap').innerHTML=`<table><thead>${th1}${th2}</thead><tbody>${tbody}</tbody></table>`;
}

function renderAll(){renderSummary();renderTrend();renderTable();}

selBranch.onchange=renderAll;
selRep.onchange=renderAll;
minNetInput.onchange=renderAll;

document.getElementById('viewTabs').onclick=e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('#viewTabs .tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');currentView=t.dataset.v;renderTable();
};
document.getElementById('chartTabs').onclick=e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('#chartTabs .tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');chartMetric=t.dataset.v;renderTrend();
};

renderAll();
</script>
</body>
</html>
